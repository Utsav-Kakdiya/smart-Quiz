<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Smart Quiz | Question</title>
  <link rel="stylesheet" href="./css/question.css" />
  <link rel="stylesheet" href="./css/common_style.css" />
  <link rel="stylesheet" href="./css/loader.css">

</head>

<body>

  <!-- Loader  -->
  <div id="loader" style="display: none;">
    <div class="spinner"></div>
    <span>loading text...</span>
  </div>

  <section id="question-render">
  <!-- Progress -->
  <section class="progress-section">
    <div class="container">
      <div class="progress-info">
        <div class="progress-info-first">
          <span>Question Progress</span>
          <strong id="queProgress">3 of 10</strong>
        </div>
        <div class="progress-info-second">
          <p>30% Complete</p>
        </div>
      </div>
      <div class="progress-bar">
        <div class="progress-fill"></div>
      </div>
    </div>
  </section>

  <!-- Timer -->
  <div class="timer">
    <div class="timer-circle" id="timerCircle">
      <div class="timer-content">
        <h2 id="timerSeconds">00</h2>
        <span id="remaining">remaining</span>
      </div>
    </div>
  </div>

  <!-- Question Card -->
  <section class="question-card">
    <div class="question-header">
      <div class="q-number">3</div>
      <h2 id="question">What is the value of π (pi) rounded to two decimal places?</h2>
    </div>

    <hr />

    <div class="question-meta">
      <span>
        <img src="./Assets/question-level.png" width="15" />
        Difficulty:
        <strong style="color: #de7b02" id="question-level">Medium</strong>
      </span>
    </div>
  </section>

  <!-- Options -->
  <section class="options">
  </section>

  <!-- Footer Controls -->
  <footer class="quiz-footer">
    <button class="btn btn-dark back-btn" id="previous">
      <span class="arrow">&#8592; </span>Previous
    </button>
    <strong style="color: #ff0000;font-size: 1.5em;display: none;" id="attemp-message">Please attemp all the
      questions!!</strong>

    <button class="btn btn-primary start-btn" style="font-size: 1.2em" id="next">
      Next<span class="right-arrow">&#8594;</span>
    </button>
    <button class="btn btn-primary start-btn" style="font-size: 1.2em;padding: 18px 28px;display: none;" id="submitBtn">
      Submit
    </button>
  </footer>
</section>

  <section id="mini-result" style="display: none;">
    <div class="container">
      <div class="mini-result-main">
        <h2 style="font-size: 2.5rem;">Result</h2>
        <img src="./Assets/mini-result-right.png" width="80">
        <p class="quiz-msg">Quiz Completed</p>
        <h3 id="yourScore">Your Score : </h3>
        <div class="mini-score">
          <div class="wrong-questions">
            <p>Wrong Questions</p>
            <p style="text-align: center;margin-top: 10px;" id="wrongQueCount">3</p>
          </div>
          <div class="total-questions">
            <p>Total Questions</p>
            <p style="text-align: center;margin-top: 10px;" id="totalQueCount">10</p>
          </div>
        </div>
        <div class="mini-result-btns">
          <button class="hero-btn-second btn btn-dark"><a href="start_quiz.html">Start new Quiz</a></button>
          <button class="hero-btn-first btn btn-primary"><a href="analytics.html">View Analytics</a></button>
        </div>
      </div>
    </div>
  </section>

  <script src="./js/loader.js"></script>
  <script src="./js/questions.js"></script>

</body>

</html>
