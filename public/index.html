<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Sign Up Page</title>
    <link rel="stylesheet" href="./css/common_style.css">
    <link rel="stylesheet" href="./css/index.css">
    <link rel="stylesheet" href="./css/loader.css">

</head>

<body>

    <!-- Loader  -->
    <div id="loader" style="display: none;">
        <div class="spinner"></div>
        <span>loading text...</span>
    </div>

    <div class="container">
        <div class="main">

            <!-- LEFT -->
            <div class="left">
                <h1 style="font-size: 3.2em;">Welcome!</h1>
                <p style="margin-bottom: 20px;">Sign Up with your Username and Email.</p>

                <form id="signupForm" action="/register" method="post">
                    <div id="signupSection">

                        <div class="input-box">
                            <input type="text" id="username" placeholder="Username" name="name" required>
                        </div>

                        <div class="input-box">
                            <input type="tel" id="phone" placeholder="Phone Number" name="phone" required>
                        </div>

                        <div class="input-box">
                            <input type="email" id="email" placeholder="Email" name="email" required>
                        </div>

                        <div class="input-box">
                            <input type="password" id="password" placeholder="Password" name="password" required>
                        </div>

                        <div class="input-box">
                            <input type="password" id="confirm-password" placeholder="Confirm Password"
                                name="confirm-password" required>
                        </div>

                        <div class="input-box">
                            <input type="checkbox" id="privacy-policy" required>&ensp;&ensp;I Agree to Privacy Policy
                        </div>

                        <button class="sign-up-btn btn-dark" type="submit">Sign Up</button>
                    </div>

                    <!-- To take the Otp from the user  -->
                    <div id="otpverification" style="display: none;">
                        <input type="hidden" id="otpEmail" name="email">
                        <input type="text" id="OTP" placeholder="Enter OTP" name="OTP">
                        <button class="sign-up-btn btn-dark" type="submit" id="submitOtp">Submit</button>
                    </div>

                </form>
                <div id="error-message" style="color:red;"></div>
                <div class="register">
                    Already have an account? <a href="login.html">Log in</a>
                </div>
            </div>

            <!-- RIGHT -->
            <div class="right">
                <img src="./Assets/signup.png" alt="quiz Image">
            </div>
        </div>

    </div>

    <script src="./js/loader.js"></script>
    <script src="./js/index.js"></script>

</body>

</html>
